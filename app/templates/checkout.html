<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Smart Travel Planner - Secure Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f2f6fb;
            margin: 40px;
        }
        .container {
            max-width: 650px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,.15);
        }
        h2 {
            color: #0b5ed7;
            text-align: center;
        }
        .info {
            margin-top: 20px;
            line-height: 2;
            font-size: 16px;
        }
        button {
            width: 100%;
            margin-top: 30px;
            padding: 15px;
            border: none;
            background: #0b5ed7;
            color: white;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.3s;
        }
        button:hover:not(:disabled) {
            background: #084298;
        }
        button:disabled {
            background: #a0c1f2;
            cursor: not-allowed;
        }
        .error {
            color: red;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Smart Travel Planner</h2>
    <h3 align="center">Secure Travel Checkout</h3>
    
    <div class="info" id="bookingDetails">
        <i>Initializing secure gateway... Please wait.</i>
    </div>
    
    <div id="errorMessage" class="error"></div>

    <button id="payBtn" onclick="payNow()" disabled>Loading...</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const bookingReference = urlParams.get("booking_reference");
    
    // Fallback to empty strings if not provided in URL
    const prefillName = urlParams.get("name") || "";
    const prefillEmail = urlParams.get("email") || "";
    const prefillContact = urlParams.get("contact") || "";

    let orderData = {};
    const payBtn = document.getElementById("payBtn");
    const detailsDiv = document.getElementById("bookingDetails");
    const errorDiv = document.getElementById("errorMessage");

    async function loadBooking() {
        // 1. Strict validation of the URL parameter
        if (!bookingReference || bookingReference === "undefined" || bookingReference === "null") {
            detailsDiv.innerHTML = "<b>Payment Initialization Failed</b>";
            errorDiv.innerText = "Error: Invalid or missing booking reference.";
            payBtn.innerText = "Unavailable";
            return;
        }

        try {
            const response = await fetch("http://127.0.0.1:8000/api/payments/create-order", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ booking_reference: bookingReference })
            });

            // 2. Read the body EXACTLY ONCE to prevent the "stream already read" crash
            const responseData = await response.json();

            // 3. Check if the backend threw an error (like 400 or 500)
            if (!response.ok) {
                throw new Error(responseData.detail || "Failed to initialize payment order.");
            }

            orderData = responseData;

            // 4. Populate the UI securely
            detailsDiv.innerHTML = `
                <b>Booking Reference :</b> ${orderData.booking_reference}<br><br>
                <b>Total Amount :</b> ₹${orderData.amount}<br><br>
                <b>Currency :</b> ${orderData.currency}
            `;

            payBtn.innerText = "Pay Now";
            payBtn.disabled = false;

        } catch (error) {
            detailsDiv.innerHTML = "<b>Payment Initialization Failed</b>";
            errorDiv.innerText = error.message;
            payBtn.innerText = "Unavailable";
        }
    }

    loadBooking();

    function payNow() {
        payBtn.innerText = "Processing...";
        payBtn.disabled = true;
        errorDiv.innerText = "";

        var options = {
            key: orderData.razorpay_key,
            amount: orderData.amount * 100, // Razorpay expects amount in paise
            currency: orderData.currency,
            name: "AI Smart Travel Planner",
            description: "Travel Booking Checkout",
            order_id: orderData.razorpay_order_id,
            image: "https://razorpay.com/assets/razorpay-logo.svg",
            prefill: {
                name: prefillName,
                email: prefillEmail,
                contact: prefillContact
            },
            theme: {
                color: "#0b5ed7"
            },
            modal: {
                ondismiss: function() {
                    // Re-enable button if user closes Razorpay without paying
                    payBtn.innerText = "Pay Now";
                    payBtn.disabled = false;
                }
            },
            handler: async function(response) {
                try {
                    payBtn.innerText = "Verifying Payment...";
                    
                    const verify = await fetch("http://127.0.0.1:8000/api/payments/verify", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            booking_reference: orderData.booking_reference,
                            razorpay_order_id: response.razorpay_order_id,
                            razorpay_payment_id: response.razorpay_payment_id,
                            razorpay_signature: response.razorpay_signature
                        })
                    });

                    const resultData = await verify.json();

                    if (!verify.ok) {
                        throw new Error(resultData.detail || "Signature verification failed.");
                    }

                    // Success -> Redirect back
                    window.location.href = "/payment-success" + 
                        "?booking_reference=" + orderData.booking_reference +
                        "&status=" + resultData.payment_status + 
                        "&payment_id=" + response.razorpay_payment_id;

                } catch (error) {
                    errorDiv.innerText = "Verification Failed: " + error.message;
                    payBtn.innerText = "Verification Error";
                }
            }
        };

        var rzp = new Razorpay(options);
        
        rzp.on('payment.failed', function (response){
            errorDiv.innerText = "Transaction Failed: " + response.error.description;
            payBtn.innerText = "Retry Payment";
            payBtn.disabled = false;
        });
        
        rzp.open();
    }
</script>
</body>
</html>
