<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Booking Confirmed</title>

<style>

body{

    margin:0;
    padding:0;
    background:#f4f7fb;
    font-family:Arial, Helvetica, sans-serif;

}

.container{

    width:700px;
    margin:60px auto;
    background:white;
    border-radius:12px;
    padding:40px;

    box-shadow:0 10px 30px rgba(0,0,0,.15);

}

.success{

    text-align:center;

}

.success-icon{

    font-size:80px;

    color:#28a745;

}

h1{

    color:#28a745;

}

.info{

    margin-top:40px;

    border-top:1px solid #ddd;

    padding-top:25px;

}

.row{

    display:flex;

    justify-content:space-between;

    padding:10px 0;

    border-bottom:1px solid #eee;

}

.label{

    font-weight:bold;

}

.button{

    margin-top:35px;

    display:inline-block;

    text-decoration:none;

    background:#0d6efd;

    color:white;

    padding:14px 30px;

    border-radius:8px;

}

.footer{

    margin-top:40px;

    text-align:center;

    color:#777;

}

</style>

</head>

<body>

<div class="container">

<div class="success">

<div class="success-icon">

✅

</div>

<h1>

Payment Successful

</h1>

<p>

Your travel booking has been confirmed.

</p>

</div>

<div class="info">

<div class="row">

<span class="label">

Booking Reference

</span>

<span id="bookingReference">

--

</span>

</div>

<div class="row">

<span class="label">

Payment Status

</span>

<span id="paymentStatus">

--

</span>

</div>

<div class="row">

<span class="label">

Payment ID

</span>

<span id="paymentId">

--

</span>

</div>

</div>

<div style="text-align:center;">

<a href="/docs" class="button">

Back to API

</a>

</div>

<div class="footer">

Thank you for choosing

<b>AI Smart Travel Planner</b>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("bookingReference").innerText =
params.get("booking_reference");

document.getElementById("paymentStatus").innerText =
params.get("status");

document.getElementById("paymentId").innerText =
params.get("payment_id");

</script>

</body>

</html>
